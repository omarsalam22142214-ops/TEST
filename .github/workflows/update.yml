name: Auto Update Matches

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

# --- التعديل السحري هنا (إعطاء صلاحية الكتابة للروبوت) ---
permissions:
  contents: write
# --------------------------------------------------------

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # حدثنا دي لـ v4 عشان نشيل التحذير الأصفر

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper beautifulsoup4

      - name: Run Python Scraper
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add matches.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 تحديث تلقائي للماتشات"
          git push
